version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pyvision_user
      POSTGRES_PASSWORD: pyvision_password
      POSTGRES_DB: pyvision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://pyvision_user:pyvision_password@db:5432/pyvision_db
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
